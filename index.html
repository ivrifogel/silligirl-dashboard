<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>silligirl · accounts dashboard</title>
<style>
  :root{ --bg:#fbf7f3; --card:#fff; --ink:#2a2320; --muted:#9b8f86; --line:#efe7df;
         --brooke:#7b5e3b; --tahlia:#c0392b; --isla:#a9744f; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:34px 20px 60px}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  h1{font-size:26px;margin:0;letter-spacing:-.02em}
  h1 b{color:var(--tahlia)}
  .updated{color:var(--muted);font-size:13px}
  .totals{display:flex;gap:26px;margin:18px 0 26px;flex-wrap:wrap}
  .totals div{font-size:13px;color:var(--muted)}
  .totals span{display:block;font-size:24px;color:var(--ink);font-weight:650}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 20px 16px;
        box-shadow:0 1px 0 rgba(0,0,0,.02)}
  .name{display:flex;align-items:center;gap:9px;font-weight:650;font-size:15px}
  .dot{width:10px;height:10px;border-radius:50%}
  .handle{color:var(--muted);font-size:12px;font-weight:400}
  a.handle{text-decoration:none;transition:color .12s}
  a.handle:hover{color:var(--ink);text-decoration:underline}
  .iglink{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:8px 12px;
    border:1px solid var(--line);border-radius:10px;text-decoration:none;font-size:12.5px;font-weight:600;
    color:var(--ink);background:var(--bg);transition:background .12s,border-color .12s}
  .iglink:hover{background:#fff;border-color:#dcd2c8}
  .iglink svg{width:15px;height:15px}
  .big{font-size:40px;font-weight:700;letter-spacing:-.03em;margin:10px 0 0}
  .delta{font-size:13px;font-weight:600;margin-left:6px}
  .up{color:#2e9e5b}.down{color:#c0392b}.flat{color:var(--muted)}
  .sub{color:var(--muted);font-size:12px;margin-top:1px}
  .stats{display:flex;gap:18px;margin:16px 0 4px;border-top:1px solid var(--line);padding-top:14px}
  .stats div{font-size:12px;color:var(--muted)}
  .stats b{display:block;font-size:19px;color:var(--ink);font-weight:650}
  .posts{display:flex;gap:7px;margin-top:14px;overflow:hidden}
  .pp{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:7px 6px;text-align:center;font-size:11px;color:var(--muted)}
  .pp b{display:block;color:var(--ink);font-size:13px}
  .spark{height:34px;margin-top:14px}
  .err{background:#fff5f3;border:1px dashed #f0c0b6;color:#b14;border-radius:12px;
       padding:14px 16px;font-size:13px;margin-top:14px}
  .note{margin-top:28px;color:var(--muted);font-size:12.5px;line-height:1.6;border-top:1px solid var(--line);padding-top:16px}
  .note code{background:#f1eae3;padding:1px 6px;border-radius:5px;font-size:11.5px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>silli<b>girl</b> · accounts</h1>
    <div class="updated" id="updated">—</div>
  </header>
  <div class="totals" id="totals"></div>
  <div class="grid" id="grid"></div>
  <div class="note" id="note"></div>
</div>

<script src="data.js" onerror="window.DATA=null"></script>
<script>
const META = {
  "brookes.siligirl": {label:"Brooke", color:"var(--brooke)"},
  "tahliasclips":     {label:"Tahlia", color:"var(--tahlia)"},
  "islasclips":       {label:"Isla",   color:"var(--isla)"},
};
const n = v => v==null ? "—" : (+v).toLocaleString();
const sum = a => a.reduce((s,x)=> s + (x||0), 0);

function spark(points, color){
  if(points.length<2) return "";
  const w=240,h=34,min=Math.min(...points),max=Math.max(...points),rng=(max-min)||1;
  const pts=points.map((p,i)=>`${(i/(points.length-1)*w).toFixed(1)},${(h-((p-min)/rng)*(h-6)-3).toFixed(1)}`).join(" ");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" width="100%">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}

function deltaFor(handle, key){
  const h = (DATA.history||[]).filter(p=>p[handle]);
  if(h.length<2) return null;
  return (h[h.length-1][handle][key]||0) - (h[h.length-2][handle][key]||0);
}
function deltaTag(d){
  if(d==null) return "";
  const cls = d>0?"up":d<0?"down":"flat", s = d>0?"▲":d<0?"▼":"–";
  return `<span class="delta ${cls}">${s} ${Math.abs(d).toLocaleString()}</span>`;
}

const grid=document.getElementById("grid");
if(!window.DATA || !DATA.accounts){
  document.getElementById("updated").textContent="no data yet";
  grid.innerHTML = `<div class="err">No snapshot yet. Run <code>python3 fetch.py</code> (it runs automatically every 12h). Data sources: ScrapeCreators (needs credits) or the public IG endpoint.</div>`;
}else{
  document.getElementById("updated").textContent = "updated " + (DATA.updated||"").replace("T"," ");
  const accs=DATA.accounts;
  const okFollowers = Object.values(accs).map(a=>a.followers).filter(x=>x!=null);
  const totalFollowers = sum(okFollowers);
  const totalViews = sum(Object.values(accs).flatMap(a=>(a.recent||[]).map(p=>p.views||0)));
  const totalComments = sum(Object.values(accs).flatMap(a=>(a.recent||[]).map(p=>p.comments||0)));
  document.getElementById("totals").innerHTML =
    `<div>Total followers<span>${n(totalFollowers)}</span></div>
     <div>Views (recent posts)<span>${n(totalViews)}</span></div>
     <div>Comments (recent)<span>${n(totalComments)}</span></div>
     <div>Accounts<span>3</span></div>`;

  grid.innerHTML = Object.keys(META).map(handle=>{
    const a = accs[handle] || {};
    const m = META[handle];
    if(a.error){
      return `<div class="card"><div class="name"><span class="dot" style="background:${m.color}"></span>${m.label}
        <a class="handle" href="https://www.instagram.com/${handle}/" target="_blank" rel="noopener">@${handle} ↗</a></div>
        <div class="err">couldn't fetch: ${a.error}</div></div>`;
    }
    const recent=(a.recent||[]);
    const vids=recent.filter(p=>p.views!=null);
    const avgViews = vids.length? Math.round(sum(vids.map(p=>p.views))/vids.length): null;
    const cmts = sum(recent.map(p=>p.comments||0));
    const histPts=(DATA.history||[]).filter(p=>p[handle]).map(p=>p[handle].followers);
    const posts = recent.slice(0,4).map(p=>
      `<div class="pp"><b>${p.views!=null?n(p.views):"—"}</b>views<br><b>${n(p.comments)}</b>cmts</div>`).join("");
    return `<div class="card">
      <div class="name"><span class="dot" style="background:${m.color}"></span>${m.label}
        <a class="handle" href="https://www.instagram.com/${handle}/" target="_blank" rel="noopener">@${handle} ↗</a></div>
      <div class="big">${n(a.followers)}${deltaTag(deltaFor(handle,"followers"))}</div>
      <div class="sub">followers · ${n(a.posts)} posts ${deltaTag(deltaFor(handle,"posts"))}</div>
      ${spark(histPts,m.color)}
      <div class="stats">
        <div><b>${avgViews!=null?n(avgViews):"—"}</b>avg views</div>
        <div><b>${n(cmts)}</b>comments</div>
        <div><b>${n(a.following)}</b>following</div>
      </div>
      ${posts?`<div class="posts">${posts}</div>`:""}
      <a class="iglink" href="https://www.instagram.com/${handle}/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.3" fill="currentColor" stroke="none"/></svg>
        Open Instagram</a>
    </div>`;
  }).join("");
}
document.getElementById("note").innerHTML =
  `Auto-refreshes every 12h via launchd (<code>fetch.py</code>). Pulls from ScrapeCreators first, falls back to Instagram's public endpoint. Δ = change since the previous snapshot. Open this file in any browser; no server needed.`;
</script>
</body>
</html>
